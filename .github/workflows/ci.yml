name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Tiny model for integration tests (~138MB Q8_0, has chat template)
  MODEL_URL: https://huggingface.co/unsloth/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q8_0.gguf
  MODEL_FILE: SmolLM2-135M-Instruct-Q8_0.gguf
  SCCACHE_GHA_ENABLED: "true"

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ── UI ──
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/ci.yml

      - name: Build UI
        working-directory: mesh-llm/ui
        run: npm ci && npm run build

      - name: Install official OpenAI Python SDK
        run: python -m pip install --upgrade pip openai

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mesh-llm

      - name: Unit tests
        run: cargo test --release

      - name: Build mesh-llm
        run: cargo build --release -p mesh-llm --bin mesh-llm

      - name: Check formatting
        working-directory: mesh-llm
        run: cargo fmt -- --check || true

      - name: Clippy
        working-directory: mesh-llm
        run: cargo clippy -- -D warnings || true

      # ── llama.cpp (CPU-only for CI) ──
      - name: Clone llama.cpp fork
        run: git clone -b rebase-upstream-master --depth 1 https://github.com/michaelneale/llama.cpp.git llama.cpp

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(nproc) --target rpc-server llama-server

      # ── Download model ──
      - name: Cache model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: model-${{ env.MODEL_FILE }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MODEL_URL" -o ~/.models/$MODEL_FILE
          ls -lh ~/.models/$MODEL_FILE

      # ── Integration smoke test ──
      - name: Smoke test (real inference)
        run: |
          scripts/ci-smoke-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: OpenAI Python compat smoke
        run: |
          scripts/ci-compat-smoke.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: Split-mode test (host/worker routing)
        run: |
          scripts/ci-split-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: CLI smoke test
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      # ── UI ──
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        run: npm ci && npm run build

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mesh-llm

      - name: Unit tests
        run: cargo test --release

      - name: Build mesh-llm
        run: cargo build --release -p mesh-llm --bin mesh-llm

      # ── llama.cpp (Metal + RPC) ──
      - name: Clone llama.cpp fork
        run: git clone -b rebase-upstream-master --depth 1 https://github.com/michaelneale/llama.cpp.git llama.cpp

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(sysctl -n hw.ncpu) --target rpc-server llama-server

      # ── Download model ──
      - name: Cache model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: model-${{ env.MODEL_FILE }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MODEL_URL" -o ~/.models/$MODEL_FILE
          ls -lh ~/.models/$MODEL_FILE

      # ── Integration smoke test ──
      - name: Smoke test (real inference)
        run: |
          scripts/ci-smoke-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: Split-mode test (host/worker routing)
        run: |
          scripts/ci-split-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: CLI smoke test
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_cuda:
    name: Linux CUDA
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build Linux CUDA backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-cuda

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_rocm:
    name: Linux ROCm
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.0-complete

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build Linux ROCm backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-amd

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_vulkan:
    name: Linux Vulkan
    runs-on: ubuntu-latest

    steps:
      - name: Install Vulkan build packages
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libvulkan-dev \
            glslc \
            python3
          sudo rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build Linux Vulkan backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-vulkan

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  windows:
    name: Windows ${{ matrix.name }}
    runs-on: windows-2022
    env:
      ROCM_HIP_SDK_FILENAME: AMD-Software-PRO-Edition-25.Q3-WinSvr2022-For-HIP.exe
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CPU
            backend: cpu
          - name: CUDA
            backend: cuda
          - name: ROCm
            backend: rocm
          - name: Vulkan
            backend: vulkan

    steps:
      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      # ── UI ──
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: pwsh
        run: |
          npm ci
          npm run build

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Cache Windows SDK installers
        if: matrix.backend != 'cpu'
        uses: actions/cache@v5
        with:
          path: ~\sdk-installer-cache\${{ matrix.backend }}
          key: windows-sdk-installers-${{ matrix.backend }}-${{ env.ROCM_HIP_SDK_FILENAME }}-${{ hashFiles('scripts/install-windows-sdk.ps1') }}

      - name: Install backend SDK
        shell: pwsh
        run: |
          .\scripts\install-windows-sdk.ps1 `
            -Backend '${{ matrix.backend }}' `
            -RocmHipSdkFilename $env:ROCM_HIP_SDK_FILENAME `
            -InstallerCacheDir (Join-Path $env:USERPROFILE 'sdk-installer-cache\${{ matrix.backend }}')

      - name: Build Windows backend
        shell: pwsh
        run: |
          just build backend=${{ matrix.backend }}

      - name: Cache model
        if: matrix.backend == 'cpu'
        id: cache-model-windows
        uses: actions/cache@v5
        with:
          path: ~\.models\${{ env.MODEL_FILE }}
          key: windows-model-${{ env.MODEL_FILE }}

      - name: Download model
        if: matrix.backend == 'cpu' && steps.cache-model-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $modelDir = Join-Path $env:USERPROFILE '.models'
          New-Item -ItemType Directory -Path $modelDir -Force | Out-Null
          $modelPath = Join-Path $modelDir '${{ env.MODEL_FILE }}'
          Invoke-WebRequest -Uri '${{ env.MODEL_URL }}' -OutFile $modelPath
          Get-Item $modelPath | Format-List FullName,Length

      - name: Smoke test (real inference)
        if: matrix.backend == 'cpu'
        shell: pwsh
        run: |
          $modelPath = Join-Path $env:USERPROFILE '.models\${{ env.MODEL_FILE }}'
          .\scripts\ci-smoke-test.ps1 `
            -MeshLlm .\target\release\mesh-llm.exe `
            -BinDir .\llama.cpp\build\bin `
            -ModelPath $modelPath

      - name: CLI smoke test
        if: matrix.backend != 'cpu'
        shell: pwsh
        run: |
          target\release\mesh-llm.exe --version
          target\release\mesh-llm.exe --help | Select-Object -First 5

      - name: Show sccache stats
        if: always()
        shell: pwsh
        run: |
          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --show-stats
          }
