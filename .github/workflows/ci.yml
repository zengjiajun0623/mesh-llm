name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mesh-llm

      - name: Build mesh-llm
        working-directory: mesh-llm
        run: cargo build --release

      - name: Test mesh-llm
        working-directory: mesh-llm
        run: cargo test

      - name: Smoke test CLI
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Check formatting
        working-directory: mesh-llm
        run: cargo fmt -- --check || true

      - name: Clippy
        working-directory: mesh-llm
        run: cargo clippy -- -D warnings || true

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mesh-llm

      - name: Build mesh-llm
        working-directory: mesh-llm
        run: cargo build --release

      - name: Test mesh-llm
        working-directory: mesh-llm
        run: cargo test

      - name: Smoke test CLI
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Check formatting
        working-directory: mesh-llm
        run: cargo fmt -- --check || true

      - name: Clippy
        working-directory: mesh-llm
        run: cargo clippy -- -D warnings || true
