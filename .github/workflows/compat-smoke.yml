name: Compat Smoke

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: compat-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MODEL_URL: https://huggingface.co/unsloth/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q8_0.gguf
  MODEL_FILE: SmolLM2-135M-Instruct-Q8_0.gguf
  SCCACHE_GHA_ENABLED: "true"

jobs:
  openai-python:
    name: OpenAI Python Compat Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/compat-smoke.yml

      - name: Install official OpenAI Python SDK
        run: python -m pip install --upgrade pip openai

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build mesh-llm + llama.cpp (CPU)
        run: just build backend=cpu

      - name: Cache model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: compat-model-${{ env.MODEL_FILE }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MODEL_URL" -o ~/.models/$MODEL_FILE
          ls -lh ~/.models/$MODEL_FILE

      - name: Run compat smoke
        run: just compat-smoke ~/.models/$MODEL_FILE

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
